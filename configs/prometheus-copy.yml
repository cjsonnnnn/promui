# my global config
global:
  scrape_interval: 10s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # ========================================================================
  # CADVISOR ===============================================================
  # ========================================================================

  - job_name: "mimity-belugabox-cadvisor"
    static_configs:
      - targets: ["100.93.10.11:8080"]

  # ========================================================================
  # CRABAL CORE ============================================================
  # ========================================================================

  - job_name: "blackbox_crabal_core"
    metrics_path: /probe
    params:
      module: [http_web]
    static_configs:
      - targets:
          - "https://core.fata-organa.com/"
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: "100.124.140.93:9115"

  # ========================================================================
  # GITLAB =================================================================
  # ========================================================================

  # 3) GitLab Readiness (service benar-benar siap melayani)
  - job_name: "blackbox_gitlab_readiness"
    metrics_path: /probe
    params:
      module: [gitlab_readiness]
    static_configs:
      - targets:
          - "https://gitlab.fata-organa.com/-/readiness"
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: "100.91.92.128:9115"

  # 4) GitLab Liveness (process hidup / tidak hang)
  - job_name: "blackbox_gitlab_liveness"
    metrics_path: /probe
    params:
      module: [gitlab_liveness]
    static_configs:
      - targets:
          - "https://gitlab.fata-organa.com/-/liveness"
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: "100.91.92.128:9115"

  # 5) GitLab Web (user-facing uptime)
  - job_name: "blackbox_gitlab_web"
    metrics_path: /probe
    params:
      module: [gitlab_web]
    static_configs:
      - targets:
          - "https://gitlab.fata-organa.com/"
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: "100.91.92.128:9115"

